<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chao Ting Pro Selects | 專業攝影器材選物</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // 動態偵測環境變數
        const getFirebaseConfig = () => {
            try {
                if (typeof __firebase_config !== 'undefined') {
                    return JSON.parse(__firebase_config);
                }
            } catch (e) { console.error("解析 Firebase Config 失敗", e); }
            return null;
        };

        const config = getFirebaseConfig();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chao-ting-selects-v2';
        
        // 預設密碼 (可於此處修改)
        window.ADMIN_PASS = "6767";

        if (!config) {
            console.error("Firebase Config 缺失！請確保在支援的預覽環境中執行。");
        } else {
            const app = initializeApp(config);
            const db = getFirestore(app);
            const auth = getAuth(app);

            // 核心儲存邏輯 (遵循 Rule 1: /artifacts/{appId}/public/data/{collection})
            window.saveToCloud = async (data) => {
                if (!auth.currentUser) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'main_catalog');
                    await setDoc(docRef, { catalog: data, lastUpdated: Date.now() });
                } catch (e) {
                    console.error("儲存至雲端失敗:", e);
                }
            };

            // 初始化與權限處理 (遵循 Rule 3: 先 Auth 再 Query)
            const init = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            // 監聽雲端資料
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'main_catalog');
                            onSnapshot(docRef, (docSnap) => {
                                if (docSnap.exists()) {
                                    window.catalog = docSnap.data().catalog || [];
                                } else {
                                    // 若無資料則載入預設值
                                    window.catalog = window.DEFAULT_DATA;
                                    window.saveToCloud(window.catalog);
                                }
                                window.render();
                            }, (err) => {
                                console.error("Firestore 監聽失敗 (請檢查 Rules 設定):", err);
                            });
                        }
                    });
                } catch (e) {
                    console.error("Auth 失敗:", e);
                }
            };

            init();
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        :root {
            --nikon-gold: #FFE800;
            --bg-dark: #080808;
            --card-bg: #121212;
            --border-color: #222222;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            color: #f0f0f0;
            margin: 0;
        }

        .gold-text { color: var(--nikon-gold); }
        .bg-gold { background-color: var(--nikon-gold); }
        
        /* 類別網格卡片 */
        .category-card {
            position: relative;
            height: 240px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .category-card img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) brightness(40%);
            transition: transform 0.6s ease, filter 0.6s ease;
        }
        .category-card:hover img, .category-card.active img {
            filter: grayscale(0%) brightness(60%);
            transform: scale(1.05);
        }
        .category-card.active { border-color: var(--nikon-gold); }

        .overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        /* 列表動畫 */
        .item-list-area {
            max-height: 0; overflow: hidden;
            transition: max-height 0.8s ease;
        }
        .item-list-area.show { max-height: 5000px; }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; }

        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        body.is-admin .admin-flex { display: flex; }
    </style>
</head>
<body class="pb-20">

    <!-- 頂部管理條 -->
    <div class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5 py-2 px-6 flex justify-between items-center text-[10px] tracking-widest uppercase">
        <span class="text-zinc-500">Curated by Chao Ting</span>
        <div class="flex gap-4 items-center">
            <button onclick="handleAdminAuth()" id="admin-toggle-btn" class="hover:text-yellow-400 transition">
                <i class="fa-solid fa-lock-open mr-1"></i> 管理入口
            </button>
            <button onclick="logoutAdmin()" id="logout-btn" class="admin-only text-red-500 hover:text-red-400">
                登出
            </button>
        </div>
    </div>

    <!-- Header -->
    <header class="max-w-7xl mx-auto px-6 pt-20 pb-12 text-center">
        <h1 class="text-4xl md:text-5xl font-light tracking-[0.2em] uppercase mb-4">
            Chao Ting <span class="font-bold gold-text">Pro Selects</span>
        </h1>
        <p class="text-gray-500 text-xs tracking-[0.4em] uppercase">專業攝影器材及影像解決方案</p>
    </header>

    <!-- 類別網格 -->
    <section class="max-w-7xl mx-auto px-6 mb-16">
        <div id="cat-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- 動態生成 -->
        </div>
        
        <!-- 新增類別 (管理員) -->
        <div class="admin-only mt-4">
            <button onclick="promptAddCategory()" class="w-full py-4 border border-dashed border-zinc-700 text-zinc-500 hover:border-gold hover:text-gold transition text-xs uppercase tracking-widest">
                + 新增商品類別
            </button>
        </div>
    </section>

    <!-- 商品列表區 -->
    <main class="max-w-5xl mx-auto px-6">
        <div id="list-header" class="hidden mb-12 text-center">
            <h2 id="active-cat-name" class="text-2xl font-bold tracking-[0.3em] uppercase gold-text">類別名稱</h2>
            <div class="w-10 h-[1px] bg-zinc-700 mx-auto mt-4"></div>
        </div>

        <div id="items-container" class="item-list-area">
            <!-- 商品列表動態生成 -->
        </div>
    </main>

    <!-- 密碼登入 Modal -->
    <div id="password-modal" class="modal">
        <div class="bg-zinc-900 p-8 rounded border border-gold w-full max-w-xs">
            <h3 class="text-gold text-center mb-6 tracking-widest font-bold">身分驗證</h3>
            <input id="pwd-input" type="password" placeholder="輸入管理密碼" class="w-full bg-black border border-zinc-800 p-3 rounded mb-4 text-center outline-none focus:border-gold">
            <div class="flex gap-2">
                <button onclick="submitPassword()" class="flex-1 bg-gold text-black font-bold py-2 rounded text-sm">確認</button>
                <button onclick="closePasswordModal()" class="flex-1 border border-zinc-700 py-2 rounded text-sm text-zinc-400">取消</button>
            </div>
        </div>
    </div>

    <!-- 實拍彈窗 -->
    <div id="photo-modal" class="modal" onclick="this.classList.remove('active')">
        <div class="relative max-w-4xl w-full p-4" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="w-full h-auto max-h-[85vh] object-contain rounded shadow-2xl border border-white/10">
            <p id="modal-caption" class="mt-4 text-center text-xs text-gray-400 tracking-widest font-light"></p>
        </div>
    </div>

    <script>
        window.DEFAULT_DATA = [
            {
                id: 'cat_001',
                name: '相機主機',
                image: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=800',
                items: [
                    { id: 1, name: 'Nikon Z8', priceOrig: 125000, priceDeal: 108800, photo: '' }
                ]
            }
        ];

        window.catalog = [];
        let activeCatId = null;
        let isAdmin = false;

        // 管理員功能
        window.handleAdminAuth = () => {
            if (isAdmin) {
                alert("目前已在管理模式");
            } else {
                document.getElementById('password-modal').classList.add('active');
                document.getElementById('pwd-input').focus();
            }
        };

        window.submitPassword = () => {
            const val = document.getElementById('pwd-input').value;
            if (val === window.ADMIN_PASS) {
                isAdmin = true;
                document.body.classList.add('is-admin');
                document.getElementById('password-modal').classList.remove('active');
                document.getElementById('pwd-input').value = "";
                window.render();
            } else {
                alert("密碼錯誤");
            }
        };

        window.closePasswordModal = () => document.getElementById('password-modal').classList.remove('active');
        
        window.logoutAdmin = () => {
            isAdmin = false;
            document.body.classList.remove('is-admin');
            window.render();
        };

        // 資料操作
        const fileToBase64 = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });

        window.promptAddCategory = async () => {
            const name = prompt("類別名稱：");
            if (!name) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const img = file ? await fileToBase64(file) : "";
                window.catalog.push({
                    id: 'cat_' + Date.now(),
                    name,
                    image: img || 'https://via.placeholder.com/800x600?text=No+Image',
                    items: []
                });
                window.saveToCloud(window.catalog);
            };
            input.click();
        };

        window.deleteCategory = (id) => {
            if (confirm("確定刪除此類別及其所有商品？")) {
                window.catalog = window.catalog.filter(c => c.id !== id);
                if (activeCatId === id) activeCatId = null;
                window.saveToCloud(window.catalog);
            }
        };

        window.addItem = (catId) => {
            const name = prompt("商品名稱：");
            if (!name) return;
            const priceOrig = parseInt(prompt("原價：", "0")) || 0;
            const priceDeal = parseInt(prompt("優惠價：", "0")) || 0;
            const cat = window.catalog.find(c => c.id === catId);
            cat.items.push({ id: Date.now(), name, priceOrig, priceDeal, photo: '' });
            window.saveToCloud(window.catalog);
        };

        window.deleteItem = (catId, itemId) => {
            if (confirm("刪除此商品？")) {
                const cat = window.catalog.find(c => c.id === catId);
                cat.items = cat.items.filter(i => i.id !== itemId);
                window.saveToCloud(window.catalog);
            }
        };

        window.uploadItemPhoto = (catId, itemId) => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const img = await fileToBase64(file);
                    const cat = window.catalog.find(c => c.id === catId);
                    const item = cat.items.find(i => i.id === itemId);
                    item.photo = img;
                    window.saveToCloud(window.catalog);
                }
            };
            input.click();
        };

        // UI 渲染
        window.render = () => {
            const grid = document.getElementById('cat-grid');
            grid.innerHTML = window.catalog.map(cat => `
                <div class="category-card group ${activeCatId === cat.id ? 'active' : ''}" onclick="selectCat('${cat.id}')">
                    <img src="${cat.image}" alt="${cat.name}">
                    <div class="overlay">
                        <h3 class="text-sm font-bold tracking-widest">${cat.name}</h3>
                    </div>
                    ${isAdmin ? `
                        <button onclick="event.stopPropagation(); deleteCategory('${cat.id}')" class="absolute top-2 right-2 bg-red-900/80 p-1 rounded text-[8px] hover:bg-red-600">DEL</button>
                    ` : ''}
                </div>
            `).join('');

            const container = document.getElementById('items-container');
            const header = document.getElementById('list-header');
            
            if (activeCatId) {
                const cat = window.catalog.find(c => c.id === activeCatId);
                document.getElementById('active-cat-name').innerText = cat.name;
                header.classList.remove('hidden');
                container.classList.add('show');
                
                container.innerHTML = `
                    <div class="divide-y divide-white/5">
                        ${cat.items.map(item => `
                            <div class="py-8 flex flex-col md:flex-row md:items-center justify-between gap-4 group">
                                <div class="flex-1">
                                    <h4 class="text-lg font-medium tracking-wide">${item.name}</h4>
                                    <div class="flex gap-4 mt-2">
                                        ${item.photo ? `<button onclick="showFullPhoto('${item.photo}', '${item.name}')" class="text-[10px] gold-text uppercase hover:underline">View Result 實拍</button>` : ''}
                                        ${isAdmin ? `<button onclick="uploadItemPhoto('${cat.id}', ${item.id})" class="text-[10px] text-zinc-500 hover:text-white uppercase">Upload Photo</button>` : ''}
                                    </div>
                                </div>
                                <div class="flex items-center gap-8">
                                    <div class="text-right">
                                        <div class="text-[10px] text-zinc-600 line-through">NT$ ${item.priceOrig.toLocaleString()}</div>
                                        <div class="text-sm gold-text font-bold">NT$ ${item.priceDeal.toLocaleString()}</div>
                                    </div>
                                    <button onclick="window.open('https://m.me/chaoting67', '_blank')" class="bg-white/5 border border-white/10 px-6 py-2 rounded text-[10px] tracking-widest hover:bg-gold hover:text-black transition">私訊連結</button>
                                    ${isAdmin ? `
                                        <button onclick="deleteItem('${cat.id}', ${item.id})" class="text-red-900 hover:text-red-500 ml-2"><i class="fa-solid fa-trash-can"></i></button>
                                    ` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ${isAdmin ? `
                        <button onclick="addItem('${cat.id}')" class="w-full py-6 mt-8 border border-dashed border-zinc-800 text-zinc-600 text-xs hover:text-zinc-400">+ ADD ITEM</button>
                    ` : ''}
                `;
            } else {
                header.classList.add('hidden');
                container.classList.remove('show');
            }
        };

        window.selectCat = (id) => {
            activeCatId = (activeCatId === id) ? null : id;
            window.render();
            if (activeCatId) {
                setTimeout(() => {
                    document.getElementById('list-header').scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        };

        window.showFullPhoto = (url, name) => {
            document.getElementById('modal-img').src = url;
            document.getElementById('modal-caption').innerText = `Works with ${name}`;
            document.getElementById('photo-modal').classList.add('active');
        };

    </script>
</body>
</html>
