<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chao Ting Pro Selects | 雲端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        /** * 核心解決方案 1: 手動填入 Config (針對 GitHub Pages 測試)
         * 如果 __firebase_config 存在則自動使用系統提供，否則請填入您的資訊
         */
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chao-ting-pro-v2';
        
        // 全域變數初始化
        window.ADMIN_PASS = "6767";
        window.catalog = [];
        let db, auth;

        const statusEl = document.createElement('div');
        statusEl.className = "fixed bottom-4 left-4 text-[10px] text-zinc-600 z-[9999]";
        document.body.appendChild(statusEl);

        async function initFirebase() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                statusEl.innerText = "Firebase: Connecting...";

                // 核心解決方案 3: 先執行匿名登入
                const cred = await signInAnonymously(auth);
                const user = cred.user;
                statusEl.innerText = `Firebase: Connected (${user.uid})`;

                // 核心規則: 必須使用特定路徑 /artifacts/{appId}/public/data/main_catalog
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'main_catalog');

                // 監聽雲端資料
                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        window.catalog = docSnap.data().catalog || [];
                        console.log("資料已同步自雲端");
                    } else {
                        window.catalog = window.DEFAULT_DATA;
                        saveToCloud(window.catalog);
                        console.log("雲端無資料，已初始化預設值");
                    }
                    window.render();
                }, (error) => {
                    console.error("Firestore Error:", error);
                    statusEl.innerText = "Firestore: Permission Denied or Not Started";
                });

            } catch (e) {
                console.error("Firebase Init Failed:", e);
                statusEl.innerText = "Firebase: Config Error";
            }
        }

        window.saveToCloud = async (data) => {
            if (!db || !auth.currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'main_catalog');
                await setDoc(docRef, { 
                    catalog: data, 
                    lastUpdated: Date.now(),
                    editor: auth.currentUser.uid 
                });
                console.log("儲存成功");
            } catch (e) {
                console.error("儲存失敗:", e);
                alert("雲端儲存失敗，請檢查權限設定");
            }
        };

        window.onload = initFirebase;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        :root { --nikon-gold: #FFE800; --bg-dark: #080808; }
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: var(--bg-dark); color: #f0f0f0; margin: 0; }
        .gold-text { color: var(--nikon-gold); }
        .bg-gold { background-color: var(--nikon-gold); }
        .category-card { position: relative; height: 200px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .category-card:hover, .category-card.active { border-color: var(--nikon-gold); }
        .category-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); transition: 0.5s; }
        .category-card:hover img, .category-card.active img { filter: brightness(60%); transform: scale(1.05); }
        .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-20">

    <div class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5 py-2 px-6 flex justify-between items-center text-[10px] tracking-widest uppercase">
        <span class="text-zinc-500">Cloud Sync Status</span>
        <div class="flex gap-4">
            <button onclick="handleAdminAuth()" id="admin-toggle-btn" class="hover:text-yellow-400">管理入口</button>
            <button onclick="logoutAdmin()" class="admin-only text-red-500">登出</button>
        </div>
    </div>

    <header class="max-w-7xl mx-auto px-6 pt-16 pb-12 text-center">
        <h1 class="text-3xl md:text-4xl font-light tracking-[0.2em] uppercase mb-2">Chao Ting <span class="font-bold gold-text">Pro Selects</span></h1>
        <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase">專業器材選物與實拍展示</p>
    </header>

    <section class="max-w-7xl mx-auto px-6 mb-12">
        <div id="cat-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        <div class="admin-only mt-4">
            <button onclick="promptAddCategory()" class="w-full py-3 border border-dashed border-zinc-700 text-zinc-500 text-[10px] uppercase tracking-[0.3em] hover:border-gold hover:text-gold">
                + 新增分類
            </button>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-6">
        <div id="list-header" class="hidden mb-10 text-center">
            <h2 id="active-cat-name" class="text-xl font-bold tracking-[0.2em] uppercase gold-text"></h2>
            <div class="w-8 h-[1px] bg-zinc-800 mx-auto mt-3"></div>
        </div>
        <div id="items-container" class="space-y-4"></div>
    </main>

    <!-- 密碼 Modal -->
    <div id="password-modal" class="modal">
        <div class="bg-zinc-900 p-8 border border-gold w-full max-w-[280px]">
            <h3 class="text-gold text-center mb-6 text-xs font-bold tracking-widest uppercase">身分驗證</h3>
            <input id="pwd-input" type="password" class="w-full bg-black border border-zinc-800 p-3 mb-4 text-center outline-none focus:border-gold">
            <button onclick="submitPassword()" class="w-full bg-gold text-black font-bold py-2 text-xs">確認進入</button>
            <button onclick="closePasswordModal()" class="w-full mt-2 text-zinc-500 text-[10px]">取消</button>
        </div>
    </div>

    <!-- 實拍 Modal -->
    <div id="photo-modal" class="modal" onclick="this.classList.remove('active')">
        <div class="relative max-w-4xl w-full p-4">
            <img id="modal-img" src="" class="w-full rounded border border-white/10">
        </div>
    </div>

    <script>
        window.DEFAULT_DATA = [
            { id: '1', name: '相機機身', image: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=800', items: [] }
        ];

        let activeCatId = null;
        let isAdmin = false;

        window.handleAdminAuth = () => {
            if (isAdmin) alert("已在管理模式");
            else { document.getElementById('password-modal').classList.add('active'); document.getElementById('pwd-input').focus(); }
        };

        window.submitPassword = () => {
            if (document.getElementById('pwd-input').value === window.ADMIN_PASS) {
                isAdmin = true;
                document.body.classList.add('is-admin');
                document.getElementById('password-modal').classList.remove('active');
                window.render();
            } else alert("密碼錯誤");
        };

        window.closePasswordModal = () => document.getElementById('password-modal').classList.remove('active');
        window.logoutAdmin = () => { isAdmin = false; document.body.classList.remove('is-admin'); window.render(); };

        const toBase64 = (file) => new Promise(r => {
            const reader = new FileReader();
            reader.onload = () => r(reader.result);
            reader.readAsDataURL(file);
        });

        window.promptAddCategory = async () => {
            const name = prompt("分類名稱:");
            if (!name) return;
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = async (e) => {
                const img = e.target.files[0] ? await toBase64(e.target.files[0]) : "";
                window.catalog.push({ id: Date.now().toString(), name, image: img, items: [] });
                window.saveToCloud(window.catalog);
            };
            input.click();
        };

        window.deleteCategory = (id) => {
            if (confirm("確定刪除此分類？")) {
                window.catalog = window.catalog.filter(c => c.id !== id);
                if (activeCatId === id) activeCatId = null;
                window.saveToCloud(window.catalog);
            }
        };

        window.addItem = (catId) => {
            const name = prompt("商品名稱:");
            if (!name) return;
            const priceOrig = parseInt(prompt("原價:", "0")) || 0;
            const priceDeal = parseInt(prompt("優惠價:", "0")) || 0;
            const cat = window.catalog.find(c => c.id === catId);
            cat.items.push({ id: Date.now(), name, priceOrig, priceDeal, photo: "" });
            window.saveToCloud(window.catalog);
        };

        window.deleteItem = (catId, itemId) => {
            if (confirm("刪除商品？")) {
                const cat = window.catalog.find(c => c.id === catId);
                cat.items = cat.items.filter(i => i.id !== itemId);
                window.saveToCloud(window.catalog);
            }
        };

        window.uploadItemPhoto = (catId, itemId) => {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = async (e) => {
                const img = e.target.files[0] ? await toBase64(e.target.files[0]) : "";
                const cat = window.catalog.find(c => c.id === catId);
                cat.items.find(i => i.id === itemId).photo = img;
                window.saveToCloud(window.catalog);
            };
            input.click();
        };

        window.render = () => {
            const grid = document.getElementById('cat-grid');
            grid.innerHTML = window.catalog.map(cat => `
                <div class="category-card ${activeCatId === cat.id ? 'active' : ''}" onclick="selectCat('${cat.id}')">
                    <img src="${cat.image || ''}">
                    <div class="overlay">
                        <span class="text-[10px] font-bold tracking-[0.2em] uppercase">${cat.name}</span>
                    </div>
                    ${isAdmin ? `<button onclick="event.stopPropagation(); deleteCategory('${cat.id}')" class="absolute top-1 right-1 bg-red-600/50 p-1 text-[8px]">DEL</button>` : ''}
                </div>
            `).join('');

            const container = document.getElementById('items-container');
            const header = document.getElementById('list-header');
            
            if (activeCatId) {
                const cat = window.catalog.find(c => c.id === activeCatId);
                document.getElementById('active-cat-name').innerText = cat.name;
                header.classList.remove('hidden');
                container.innerHTML = cat.items.map(item => `
                    <div class="bg-zinc-900/30 p-4 border border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="text-center md:text-left">
                            <h4 class="text-sm font-bold tracking-wide">${item.name}</h4>
                            <div class="flex gap-4 mt-1">
                                ${item.photo ? `<button onclick="showPhoto('${item.photo}')" class="text-[9px] gold-text uppercase">Result 實拍</button>` : ''}
                                ${isAdmin ? `<button onclick="uploadItemPhoto('${cat.id}', ${item.id})" class="text-[9px] text-zinc-500 uppercase">Upload</button>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="text-right">
                                <div class="text-[9px] text-zinc-600 line-through">NT$ ${item.priceOrig.toLocaleString()}</div>
                                <div class="text-xs gold-text font-bold tracking-wider">NT$ ${item.priceDeal.toLocaleString()}</div>
                            </div>
                            <button onclick="window.open('https://m.me/chaoting67', '_blank')" class="bg-white/5 px-4 py-2 border border-white/10 text-[9px] tracking-widest hover:bg-gold hover:text-black">詢價</button>
                            ${isAdmin ? `<button onclick="deleteItem('${cat.id}', ${item.id})" class="text-red-900"><i class="fa-solid fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                `).join('') + (isAdmin ? `<button onclick="addItem('${cat.id}')" class="w-full py-4 border border-dashed border-zinc-800 text-[10px] text-zinc-500 hover:text-zinc-300">+ ADD ITEM</button>` : '');
            } else {
                header.classList.add('hidden');
                container.innerHTML = '';
            }
        };

        window.selectCat = (id) => { activeCatId = (activeCatId === id) ? null : id; window.render(); };
        window.showPhoto = (url) => { document.getElementById('modal-img').src = url; document.getElementById('photo-modal').classList.add('active'); };
    </script>
</body>
</html>
