<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chao Ting Pro Selects | 專業攝影器材選物</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        :root {
            --nikon-gold: #FFE800;
            --bg-dark: #080808;
            --card-bg: #121212;
            --border-color: #222222;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            color: #f0f0f0;
            scroll-behavior: smooth;
        }

        .gold-text { color: var(--nikon-gold); }
        .bg-gold { background-color: var(--nikon-gold); }
        
        .category-grid-item {
            position: relative;
            height: 280px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }

        .category-grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(50%);
            transition: all 0.6s ease;
        }

        .category-grid-item:hover img {
            filter: grayscale(0%) brightness(70%);
            transform: scale(1.05);
        }

        .category-grid-item.active {
            border-color: var(--nikon-gold);
            box-shadow: 0 0 15px rgba(255, 232, 0, 0.2);
        }

        .category-grid-item.active img {
            filter: grayscale(0%) brightness(80%);
        }

        .category-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .item-list-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .item-list-container.active {
            max-height: 5000px;
        }

        .list-item {
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .list-item:hover {
            background: rgba(255, 232, 0, 0.03);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal.active { display: flex; }

        .admin-section {
            background: #1a1a1a;
            border: 1px dashed var(--nikon-gold);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <!-- 控制列 -->
    <div id="admin-bar" class="sticky top-0 z-50 bg-zinc-900 border-b border-white/5 py-1 px-4 text-[10px] flex justify-between items-center">
        <span id="mode-text" class="text-gray-500 uppercase tracking-widest">Public Catalog (Sync Mode)</span>
        <div class="flex gap-4">
            <button onclick="toggleAdmin()" id="admin-btn" class="hover:text-white transition">
                <i class="fa-solid fa-lock mr-1"></i> 管理員登入
            </button>
        </div>
    </div>

    <!-- 標題 -->
    <header class="max-w-7xl mx-auto px-6 pt-16 pb-12 text-center">
        <h1 class="text-4xl md:text-5xl font-light tracking-[0.2em] uppercase mb-4">
            Chao Ting <span class="font-bold gold-text">Pro Selects</span>
        </h1>
        <p class="text-gray-500 text-sm tracking-[0.3em] uppercase">雲端同步選物櫥窗</p>
        <div class="w-12 h-[1px] bg-gold mx-auto mt-8"></div>
    </header>

    <!-- 類別網格 -->
    <section class="max-w-7xl mx-auto px-6 mb-12">
        <div id="category-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <!-- 載入中動畫 -->
            <div class="col-span-full py-20 text-center text-zinc-600 animate-pulse uppercase tracking-[0.4em] text-xs">Connecting to Cloud...</div>
        </div>
    </section>

    <!-- 細項 -->
    <main class="max-w-5xl mx-auto px-6">
        <div id="active-category-title" class="hidden mb-10 text-center">
            <h2 class="text-2xl font-bold tracking-[0.2em] uppercase gold-text" id="selected-name"></h2>
            <p class="text-gray-500 text-[10px] uppercase tracking-widest mt-2">Selected Items</p>
        </div>
        <div id="items-container" class="item-list-container"></div>
    </main>

    <!-- 管理 UI -->
    <section id="admin-ui" class="max-w-5xl mx-auto px-6 mt-20 hidden">
        <div class="admin-section p-8 rounded-lg">
            <h2 class="text-lg font-bold mb-4 gold-text">管理員功能</h2>
            <div class="flex flex-col gap-4">
                <input id="new-cat-name" type="text" placeholder="新類別名稱" class="bg-black border border-zinc-800 p-3 rounded outline-none focus:border-gold">
                <button onclick="addCategory()" class="bg-gold text-black py-3 rounded font-bold uppercase tracking-widest">新增類別</button>
                <button onclick="logoutAdmin()" class="text-zinc-600 text-[10px] mt-2 underline">登出管理模式</button>
            </div>
        </div>
    </section>

    <!-- 彈窗 -->
    <div id="photo-modal" class="modal" onclick="this.classList.remove('active')">
        <div class="relative max-w-4xl w-full p-4" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="w-full h-auto max-h-[80vh] object-contain rounded shadow-2xl border border-white/10">
            <p id="modal-caption" class="mt-4 text-center text-sm text-gray-400 font-light tracking-widest"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chaoting-selects';
        
        // 狀態管理
        let catalog = [];
        let isAdmin = false;
        let activeCategoryId = null;
        const ADMIN_PASS = "chao6789";

        // 1. 初始化驗證 (RULE 3)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
            }
        };
        initAuth();

        // 2. 監聽資料更新 (多人同步核心)
        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            
            // 監聽公共資料 (RULE 1)
            const catalogDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'catalog_data');
            
            onSnapshot(catalogDocRef, (snapshot) => {
                if (snapshot.exists()) {
                    catalog = snapshot.data().list || [];
                    render();
                } else {
                    // 第一次使用，初始化空資料
                    setDoc(catalogDocRef, { list: [] });
                }
            }, (error) => {
                console.error("Firestore error:", error);
            });
        });

        // 渲染函數
        window.render = () => {
            const grid = document.getElementById('category-grid');
            const listContainer = document.getElementById('items-container');
            const titleSection = document.getElementById('active-category-title');

            if (catalog.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-zinc-600 text-xs">尚無公開內容</div>`;
            } else {
                grid.innerHTML = catalog.map(cat => `
                    <div class="category-grid-item group ${activeCategoryId === cat.id ? 'active' : ''}" onclick="window.selectCategory('${cat.id}')">
                        <img src="${cat.image || 'https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&q=80&w=800'}">
                        <div class="category-overlay">
                            <h3 class="text-xl font-bold tracking-widest uppercase">${cat.name}</h3>
                        </div>
                        ${isAdmin ? `<button onclick="event.stopPropagation(); window.deleteCategory('${cat.id}')" class="absolute top-2 right-2 bg-red-900 text-[8px] p-1 rounded">DEL</button>` : ''}
                    </div>
                `).join('');
            }

            if (activeCategoryId) {
                const selected = catalog.find(c => c.id === activeCategoryId);
                if (selected) {
                    document.getElementById('selected-name').innerText = selected.name;
                    titleSection.classList.remove('hidden');
                    listContainer.classList.add('active');
                    listContainer.innerHTML = `
                        <div class="space-y-0 py-4">
                            ${selected.items.map(item => `
                                <div class="list-item py-6 flex flex-col md:flex-row md:items-center justify-between gap-4 px-2">
                                    <div>
                                        <h3 class="text-base font-medium">${item.name}</h3>
                                        ${item.photo ? `<button onclick="window.showPhoto('${item.photo}', '${item.name}')" class="text-[10px] gold-text uppercase mt-1">查看實拍</button>` : ''}
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <div class="text-right">
                                            <div class="text-zinc-600 line-through text-[10px]">NT$ ${item.priceOrig.toLocaleString()}</div>
                                            <div class="gold-text font-bold">NT$ ${item.priceDeal.toLocaleString()}</div>
                                        </div>
                                        <button onclick="window.contact()" class="border border-white/10 px-4 py-2 rounded text-[10px] hover:bg-gold hover:text-black">私訊領取</button>
                                        ${isAdmin ? `<button onclick="window.deleteItem('${selected.id}', '${item.id}')" class="text-red-900 text-xs"><i class="fa-solid fa-trash"></i></button>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        ${isAdmin ? `<button onclick="window.addItem('${selected.id}')" class="w-full py-8 border border-dashed border-zinc-700 text-zinc-500 text-[10px] mt-4 hover:border-gold">+ 新增商品</button>` : ''}
                    `;
                }
            }
        };

        // 功能函數掛載到 window
        window.selectCategory = (id) => {
            activeCategoryId = (activeCategoryId === id) ? null : id;
            window.render();
        };

        window.toggleAdmin = () => {
            if (!isAdmin) {
                const p = prompt("請輸入管理員金鑰：");
                if (p === ADMIN_PASS) {
                    isAdmin = true;
                    document.getElementById('admin-ui').classList.remove('hidden');
                    document.getElementById('admin-btn').innerHTML = "管理中 (SYNC)";
                    window.render();
                }
            }
        };

        window.logoutAdmin = () => {
            isAdmin = false;
            document.getElementById('admin-ui').classList.add('hidden');
            document.getElementById('admin-btn').innerHTML = "管理員登入";
            window.render();
        };

        const syncToCloud = async (newList) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'catalog_data');
            await updateDoc(docRef, { list: newList });
        };

        window.addCategory = async () => {
            const name = document.getElementById('new-cat-name').value;
            if (!name) return;
            const newList = [...catalog, { id: 'c' + Date.now(), name, image: '', items: [] }];
            await syncToCloud(newList);
            document.getElementById('new-cat-name').value = '';
        };

        window.deleteCategory = async (id) => {
            if (confirm("刪除此類別？")) {
                const newList = catalog.filter(c => c.id !== id);
                await syncToCloud(newList);
            }
        };

        window.addItem = async (catId) => {
            const name = prompt("商品名稱：");
            const price = parseInt(prompt("優惠價：", "0")) || 0;
            if (!name) return;
            
            const newList = catalog.map(c => {
                if (c.id === catId) {
                    return { ...c, items: [...c.items, { id: 'i' + Date.now(), name, priceOrig: price * 1.2, priceDeal: price, photo: '' }] };
                }
                return c;
            });
            await syncToCloud(newList);
        };

        window.deleteItem = async (catId, itemId) => {
            const newList = catalog.map(c => {
                if (c.id === catId) {
                    return { ...c, items: c.items.filter(i => i.id !== itemId) };
                }
                return c;
            });
            await syncToCloud(newList);
        };

        window.showPhoto = (url, name) => {
            document.getElementById('modal-img').src = url;
            document.getElementById('modal-caption').innerText = name;
            document.getElementById('photo-modal').classList.add('active');
        };

        window.contact = () => window.open('https://m.me/chaoting67', '_blank');

    </script>
</body>
</html>
