<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikon 團購櫥窗 - 管理系統版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0b0b0b; color: #e5e5e5; }
        .nikon-yellow { color: #FFE800; }
        .bg-nikon-yellow { background-color: #FFE800; }
        .card { background: #1a1a1a; transition: all 0.3s ease; border: 1px solid #333; position: relative; }
        .card:hover { border-color: #FFE800; }
        .price-original { text-decoration: line-through; color: #888; font-size: 0.9rem; }
        .price-deal { color: #FFE800; font-weight: bold; font-size: 1.25rem; }
        .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; }
        .badge-instock { background: #22c55e; color: white; }
        .badge-preorder { background: #3b82f6; color: white; }
        
        /* 管理員介面樣式 */
        .admin-panel { background: #222; border-top: 2px solid #FFE800; display: none; }
        .admin-active .admin-panel { display: block; }
        .admin-active .editable { border: 1px dashed #FFE800; cursor: pointer; }
    </style>
</head>
<body class="pb-20">

    <!-- 頂部管理切換 -->
    <div class="bg-zinc-800 text-[10px] text-center py-1 flex justify-center items-center gap-4">
        <span>目前為訪客視角</span>
        <button onclick="toggleAdmin()" class="bg-gray-600 px-2 py-0.5 rounded text-white">切換管理員模式 (模擬後台)</button>
    </div>

    <!-- 導覽列 -->
    <nav class="sticky top-0 z-40 bg-black/80 backdrop-blur-md border-b border-white/10 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-nikon-yellow w-8 h-8 flex items-center justify-center rounded text-black font-bold">N</div>
                <span class="text-xl font-bold tracking-tighter">NIKON 團購專區</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm uppercase tracking-widest">
                <a href="#products" class="hover:text-nikon-yellow transition">全部商品</a>
                <a href="#about" class="hover:text-nikon-yellow transition">關於我</a>
            </div>
            <button class="bg-nikon-yellow text-black px-4 py-2 rounded-full text-sm font-bold">私訊詢問</button>
        </div>
    </nav>

    <!-- 英雄區塊 -->
    <header class="relative h-[40vh] flex items-center justify-center text-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black z-10"></div>
        <img src="https://images.unsplash.com/photo-1516724562728-afc824a36e84?auto=format&fit=crop&q=80&w=2000" class="absolute inset-0 w-full h-full object-cover opacity-40" alt="背景實拍">
        <div class="relative z-20 px-4">
            <h1 class="text-3xl md:text-5xl font-bold mb-4">專業攝影師團購櫥窗</h1>
            <p class="text-gray-400 max-w-2xl mx-auto">手動模擬管理系統：切換管理模式即可直接編輯價格</p>
        </div>
    </header>

    <!-- 商品網格 -->
    <main id="products" class="max-w-7xl mx-auto px-4 py-12">
        <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 由 JavaScript 動態生成 -->
        </div>
    </main>

    <!-- 頁腳 -->
    <footer class="text-center py-10 text-gray-600 text-xs border-t border-white/5">
        管理提示：這是一個單機展示版。在實際免費方案中，資料會存儲在 Google Sheets。<br>
        © 2024 Nikon Photographer Group Buy.
    </footer>

    <script>
        // 模擬數據庫 (對應 Google Sheets 的內容)
        let products = [
            {
                id: 1,
                name: "Nikon Z8 單機身",
                priceOrig: 125000,
                priceDeal: 108800,
                status: "現貨中",
                img: "https://images.unsplash.com/photo-1614527259005-28828b86026a?auto=format&fit=crop&q=80&w=800",
                desc: "輕巧版 Z9，攝影師首選平衡機。"
            },
            {
                id: 2,
                name: "NIKKOR Z 24-70mm f/2.8 S",
                priceOrig: 68000,
                priceDeal: 59500,
                status: "預購中",
                img: "https://images.unsplash.com/photo-1617005082133-548c4dd27f35?auto=format&fit=crop&q=80&w=800",
                desc: "S-Line 極致鏡皇，解析力驚人。"
            }
        ];

        let isAdmin = false;

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(p => `
                <div class="card rounded-xl overflow-hidden ${isAdmin ? 'admin-active' : ''}">
                    <div class="relative">
                        <img src="${p.img}" class="w-full h-48 object-cover">
                        <span class="absolute top-4 left-4 badge ${p.status === '現貨中' ? 'badge-instock' : 'badge-preorder'}">${p.status}</span>
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-2 editable" onclick="editField(${p.id}, 'name')">${p.name}</h3>
                        <div class="flex items-center gap-3 mb-4">
                            <span class="price-original editable" onclick="editField(${p.id}, 'priceOrig')">NT$ ${p.priceOrig.toLocaleString()}</span>
                            <span class="price-deal editable" onclick="editField(${p.id}, 'priceDeal')">NT$ ${p.priceDeal.toLocaleString()}</span>
                        </div>
                        <p class="text-gray-400 text-sm mb-6 editable" onclick="editField(${p.id}, 'desc')">${p.desc}</p>
                        
                        <div class="admin-panel p-3 mb-4 rounded text-xs">
                            <p class="mb-2 text-nikon-yellow font-bold">管理員操作：</p>
                            <div class="flex gap-2">
                                <button onclick="updateStatus(${p.id}, '現貨中')" class="bg-green-700 px-2 py-1 rounded">設為現貨</button>
                                <button onclick="updateStatus(${p.id}, '預購中')" class="bg-blue-700 px-2 py-1 rounded">設為預購</button>
                                <button onclick="deleteProduct(${p.id})" class="bg-red-700 px-2 py-1 rounded ml-auto">刪除</button>
                            </div>
                        </div>

                        <button onclick="handleInquiry('${p.name}')" class="w-full bg-white text-black py-3 rounded font-bold hover:bg-nikon-yellow transition">
                            獲取優惠連結
                        </button>
                    </div>
                </div>
            `).join('');

            // 添加新增按鈕
            if(isAdmin) {
                container.innerHTML += `
                    <div onclick="addProduct()" class="border-2 border-dashed border-gray-700 rounded-xl flex flex-col items-center justify-center p-12 hover:border-nikon-yellow cursor-pointer text-gray-500 hover:text-nikon-yellow transition">
                        <i class="fa-solid fa-plus text-3xl mb-2"></i>
                        <p>上架新產品</p>
                    </div>
                `;
            }
        }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.body.classList.toggle('bg-zinc-900', isAdmin);
            renderProducts();
            const tip = isAdmin ? "管理員模式：點擊虛線文字可編輯內容" : "目前為訪客視角";
            console.log(tip);
        }

        function editField(id, field) {
            if(!isAdmin) return;
            const newVal = prompt("請輸入新的內容：", products.find(p => p.id === id)[field]);
            if(newVal !== null) {
                const p = products.find(p => p.id === id);
                p[field] = field.includes('price') ? parseInt(newVal.replace(/\D/g,'')) : newVal;
                renderProducts();
            }
        }

        function updateStatus(id, status) {
            products.find(p => p.id === id).status = status;
            renderProducts();
        }

        function addProduct() {
            const name = prompt("商品名稱：", "Nikon 新鏡頭");
            if(name) {
                products.push({
                    id: Date.now(),
                    name: name,
                    priceOrig: 0,
                    priceDeal: 0,
                    status: "現貨中",
                    img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=800",
                    desc: "新上架商品描述..."
                });
                renderProducts();
            }
        }

        function deleteProduct(id) {
            if(confirm("確定要刪除此商品嗎？")) {
                products = products.filter(p => p.id !== id);
                renderProducts();
            }
        }

        function handleInquiry(name) {
            const msg = `你好，我想詢問 ${name} 的團購連結！`;
            alert(`訪客點擊了！將導向 Line 並自動預填：\n"${msg}"`);
        }

        // 初始化
        window.onload = renderProducts;
    </script>
</body>
</html>
